<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄大厨炒制生成器 - 低门槛UGC工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        :root { --primary: #e67e22; --bg: #fdf6e3; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; color: #5d4037; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; border: 4px solid #f1c40f; }
        h1 { margin-top: 0; color: #d35400; font-size: 1.5rem; }
        .preview-area { position: relative; width: 256px; height: 256px; background: #fff; margin: 15px auto; border-radius: 15px; overflow: hidden; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        canvas { width: 100%; height: 100%; }
        .quote { font-style: italic; color: #7f8c8d; min-height: 1.2rem; margin-bottom: 10px; font-size: 0.9rem; }
        .controls { display: grid; gap: 12px; text-align: left; padding: 15px; background: #fff9f0; border-radius: 10px; }
        .control-group { display: flex; align-items: center; justify-content: space-between; }
        input[type="range"] { width: 65%; accent-color: var(--primary); cursor: pointer; }
        .btn-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 14px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.2s; }
        .upload-btn { background: #3498db; color: white; }
        .export-btn { background: #27ae60; color: white; box-shadow: 0 4px 0 #1e8449; }
        .export-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e8449; }
        .export-btn:disabled { background: #bdc3c7; box-shadow: none; cursor: not-allowed; }
        #resultImg { max-width: 100%; margin-top: 20px; border-radius: 12px; display: none; border: 4px solid #27ae60; }
        .loading-mask { display: none; color: #e67e22; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🍳 黄大厨特制：万物皆可炒</h1>
    <div id="quote" class="quote">“这道菜，我加了一点灵魂...”</div>

    <div class="preview-area">
        <canvas id="canvas" width="256" height="256"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>🔥 火力(速度)</label>
            <input type="range" id="speed" min="10" max="150" value="80">
        </div>
        <div class="control-group">
            <label>📏 大小</label>
            <input type="range" id="scale" min="0.3" max="1.8" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>↔️ 翻转</label>
            <input type="checkbox" id="flip">
        </div>
    </div>

    <div class="btn-group">
        <input type="file" id="upload" accept="image/png, image/jpeg, image/webp" hidden>
        <button class="upload-btn" onclick="document.getElementById('upload').click()">第一步：选择食材(上传图片)</button>
        <button id="exportBtn" class="export-btn" onclick="exportGif()">第二步：猛火炒制(导出GIF)</button>
    </div>

    <div id="loadingText" class="loading-mask">🔥 正在收汁中，请稍后...</div>
    
    <div id="resultContainer">
        <img id="resultImg">
        <p id="saveHint" style="display:none; font-size: 0.85rem; color: #27ae60; margin-top: 10px; font-weight: bold;">
            ✅ 炒制成功！长按或右键上方图片保存
        </p>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const resultImg = document.getElementById('resultImg');
    const loadingText = document.getElementById('loadingText');
    const exportBtn = document.getElementById('exportBtn');
    const quoteBox = document.getElementById('quote');
    
    let userImg = new Image();
    let isLoaded = false;
    let frame = 0;
    const totalFrames = 8; // 减少帧数使动作更干脆

    const quotes = [
        "“这火候，刚刚好。”",
        "“这道菜，我加了一点点自信。”",
        "“看这颜色，这就是生活。”",
        "“炒菜，最重要是心平气和。”",
        "“哪怕是Q版，也要炒出锅气。”"
    ];

    // 初始化占位图
    userImg.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjU2IiBoZWlnaHQ9IjI1NiIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIjZGRkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtc2l6ZT0iMTYiIGZpbGw9IiM5OTkiIHRleHQtYW5jaG9yPSJtaWRkbGUiPuW+heS4iuS8oOatp+WbvuWhvzwvdGV4dD48L3N2Zz4=';

    upload.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                userImg.src = event.target.result;
                userImg.onload = () => { 
                    isLoaded = true;
                    quoteBox.innerText = quotes[Math.floor(Math.random()*quotes.length)];
                };
            };
            reader.readAsDataURL(file);
        }
    };

    function drawFrame(f, targetCtx) {
        const speedVal = parseInt(document.getElementById('speed').value);
        const scaleAdjust = parseFloat(document.getElementById('scale').value);
        const flip = document.getElementById('flip').checked;

        targetCtx.clearRect(0, 0, 256, 256);

        // 更加剧烈的“炒菜”动效逻辑
        // 1. 快速上下跳动 (Bounce)
        const bounce = Math.abs(Math.sin((f / totalFrames) * Math.PI)) * 20;
        // 2. 挤压变形 (Squash)
        const squash = Math.cos((f / totalFrames) * Math.PI) * 15;
        
        const baseSize = 180 * scaleAdjust;
        const w = baseSize + squash;
        const h = baseSize - bounce;
        
        const x = (256 - w) / 2;
        const y = (256 - h) / 2 + bounce;

        targetCtx.save();
        if (flip) {
            targetCtx.translate(256, 0);
            targetCtx.scale(-1, 1);
        }

        targetCtx.drawImage(userImg, x, y, w, h);
        targetCtx.restore();
    }

    function animate() {
        if (isLoaded) {
            frame = (frame + 1) % totalFrames;
            drawFrame(frame, ctx);
        }
        const interval = Math.max(20, 160 - document.getElementById('speed').value);
        setTimeout(() => {
            requestAnimationFrame(animate);
        }, interval);
    }
    animate();

    // 【关键修复】跨域 Worker 解决方案
    async function exportGif() {
        if (!isLoaded) return alert('请先上传图片');
        
        exportBtn.disabled = true;
        loadingText.style.display = 'block';
        resultImg.style.display = 'none';

        try {
            // 获取 worker 的代码字符串并转为 Blob URL
            const workerResponse = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
            const workerCode = await workerResponse.text();
            const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(workerBlob);

            const gif = new GIF({
                workers: 2,
                quality: 5, // 降低一点质量以加快生成速度
                width: 256,
                height: 256,
                workerScript: workerUrl 
            });

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 256;
            tempCanvas.height = 256;
            const tCtx = tempCanvas.getContext('2d');

            const frameDelay = Math.max(20, 160 - document.getElementById('speed').value);

            for (let i = 0; i < totalFrames; i++) {
                drawFrame(i, tCtx);
                gif.addFrame(tCtx, {copy: true, delay: frameDelay});
            }

            gif.on('finished', function(blob) {
                const url = URL.createObjectURL(blob);
                resultImg.src = url;
                resultImg.style.display = 'block';
                document.getElementById('saveHint').style.display = 'block';
                exportBtn.disabled = false;
                loadingText.style.display = 'none';
                URL.revokeObjectURL(workerUrl); // 释放内存
                resultImg.scrollIntoView({ behavior: 'smooth' });
            });

            gif.render();
        } catch (err) {
            console.error(err);
            alert('生成失败，请检查网络并重试');
            exportBtn.disabled = false;
            loadingText.style.display = 'none';
        }
    }
</script>
</body>
</html>
